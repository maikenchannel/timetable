<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間割 — Campus</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   THEME TOKENS
═══════════════════════════════════════════════ */

/*
  ベースフォントサイズ戦略:
  - html に clamp() で流動的な font-size を設定
  - 20rem → 0.875rem、48rem → 1rem、80rem以上 → 1rem
  - すべての rem 値はこの基準に対してスケール
*/
html {
  font-size: clamp(0.875rem, 1vw + 0.7188rem, 1rem);
  scroll-behavior: smooth;
}

:root {
  --accent:       #7c6af7;
  --accent2:      #c084fc;
  --accent3:      #38bdf8;
  --danger:       #f87171;
  --success:      #34d399;
  --warning:      #fbbf24;
  /* rem ベースで画面解像度に追従 */
  --row-height:   5.5rem;
  --time-col:     4.5rem;
  --header-h:     3.75rem;
  --banner-h:     0px;
  --radius-card:  0.625rem;
  --radius-panel: 0.875rem;
  --t: 0.22s ease;
}

[data-theme="dark"] {
  --bg:           #0d0d11;
  --bg-mesh:      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(124,106,247,0.08) 0%, transparent 70%);
  --surface:      #16161d;
  --surface2:     #1e1e28;
  --surface3:     #252533;
  --border:       #28283a;
  --border2:      #333348;
  --text:         #e6e6f0;
  --text-dim:     #9696b0;
  --text-muted:   #60607a;
  --header-bg:    rgba(13,13,17,0.90);
  --shadow:       0 0.25rem 1.5rem rgba(0,0,0,0.45);
  --shadow-card:  0 0.5rem 1.75rem rgba(0,0,0,0.5);
  --toggle-bg:    #28283a;
  --sun:          none;
  --moon:         block;
  /* next-class banner */
  --banner-bg:    rgba(124,106,247,0.12);
  --banner-border:rgba(124,106,247,0.35);
  --banner-text:  #c4baff;
  /* in-class banner */
  --banner-now-bg:    rgba(52,211,153,0.10);
  --banner-now-border:rgba(52,211,153,0.35);
  --banner-now-text:  #6ee7b7;
  /* break banner */
  --banner-brk-bg:    rgba(251,191,36,0.10);
  --banner-brk-border:rgba(251,191,36,0.35);
  --banner-brk-text:  #fcd34d;
  /* no-class banner */
  --banner-off-bg:    rgba(99,99,120,0.10);
  --banner-off-border:rgba(99,99,120,0.25);
  --banner-off-text:  #9696b0;
}

[data-theme="light"] {
  --bg:           #f2f2f7;
  --bg-mesh:      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(124,106,247,0.05) 0%, transparent 70%);
  --surface:      #ffffff;
  --surface2:     #ededf3;
  --surface3:     #e4e4ec;
  --border:       #dcdce8;
  --border2:      #c6c6d6;
  --text:         #18181f;
  --text-dim:     #50506a;
  --text-muted:   #888899;
  --header-bg:    rgba(242,242,247,0.92);
  --shadow:       0 0.125rem 0.75rem rgba(0,0,0,0.08);
  --shadow-card:  0 0.375rem 1.25rem rgba(0,0,0,0.12);
  --toggle-bg:    #dcdce8;
  --sun:          block;
  --moon:         none;
  --banner-bg:    rgba(124,106,247,0.07);
  --banner-border:rgba(124,106,247,0.28);
  --banner-text:  #5b47d4;
  --banner-now-bg:    rgba(16,185,129,0.07);
  --banner-now-border:rgba(16,185,129,0.28);
  --banner-now-text:  #047857;
  --banner-brk-bg:    rgba(217,119,6,0.07);
  --banner-brk-border:rgba(217,119,6,0.28);
  --banner-brk-text:  #92400e;
  --banner-off-bg:    rgba(100,100,120,0.06);
  --banner-off-border:rgba(100,100,120,0.18);
  --banner-off-text:  #60607a;
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  transition: background var(--t), color var(--t);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: var(--bg-mesh);
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════════════════════
   NEXT-CLASS BANNER
═══════════════════════════════════════════════ */
#next-banner {
  position: sticky;
  top: var(--header-h);
  z-index: 150;
  display: none;
  align-items: center;
  gap: 0.875rem;
  padding: 0 1.5rem;
  height: 3.25rem;
  border-bottom: 1px solid var(--banner-border);
  background: var(--banner-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(0.75rem);
  transition: background var(--t), border-color var(--t), opacity 0.3s;
  overflow: hidden;
}
#next-banner.mode-now  {
  background: var(--banner-now-bg);
  border-color: var(--banner-now-border);
}
#next-banner.mode-brk  {
  background: var(--banner-brk-bg);
  border-color: var(--banner-brk-border);
}
#next-banner.mode-off  {
  background: var(--banner-off-bg);
  border-color: var(--banner-off-border);
}

.banner-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 0.1875rem 0.5625rem;
  border-radius: 1.25rem;
  flex-shrink: 0;
  border: 1px solid currentColor;
  opacity: 0.85;
}
#next-banner .banner-pill  { color: var(--banner-text); }
#next-banner.mode-now .banner-pill { color: var(--banner-now-text); }
#next-banner.mode-brk .banner-pill { color: var(--banner-brk-text); }
#next-banner.mode-off .banner-pill { color: var(--banner-off-text); }

.banner-main {
  flex: 1;
  display: flex;
  align-items: baseline;
  gap: 0.625rem;
  overflow: hidden;
}
.banner-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}
#next-banner.mode-now  .banner-label { color: var(--banner-now-text); opacity: 0.75; }
#next-banner.mode-brk  .banner-label { color: var(--banner-brk-text); opacity: 0.75; }
#next-banner.mode-off  .banner-label { color: var(--banner-off-text); opacity: 0.75; }

.banner-course {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--banner-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#next-banner.mode-now  .banner-course { color: var(--banner-now-text); }
#next-banner.mode-brk  .banner-course { color: var(--banner-brk-text); }
#next-banner.mode-off  .banner-course { color: var(--banner-off-text); }

.banner-loc {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--banner-text);
  opacity: 0.85;
  white-space: nowrap;
  flex-shrink: 0;
}
#next-banner.mode-now  .banner-loc { color: var(--banner-now-text); }
#next-banner.mode-brk  .banner-loc { color: var(--banner-brk-text); }
#next-banner.mode-off  .banner-loc { color: var(--banner-off-text); }

.banner-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.6875rem;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}

/* pulsing dot for "in class now" */
.banner-dot {
  width: 0.4375rem; height: 0.4375rem;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--success);
  animation: pulse 1.6s ease-in-out infinite;
  display: none;
}
#next-banner.mode-now .banner-dot { display: block; }
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.45; transform:scale(1.35); }
}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header {
  position: sticky;
  top: 0; z-index: 200;
  height: var(--header-h);
  background: var(--header-bg);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(1.25rem) saturate(1.4);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  transition: background var(--t), border-color var(--t);
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 1.0625rem; font-weight: 500; letter-spacing: 0.12em;
  background: linear-gradient(130deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; user-select: none;
}
.logo span { font-size: 0.6875rem; letter-spacing: 0.06em; opacity: 0.65; }
.header-right { display: flex; align-items: center; gap: 0.625rem; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.4375rem 0.9375rem; border-radius: 0.5rem;
  font-size: 0.7812rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 400;
  cursor: pointer; border: none; outline: none; transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #8f7fff; transform: translateY(-1px); box-shadow: 0 0.25rem 0.875rem rgba(124,106,247,0.4); }
.btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover { background: rgba(248,113,113,0.08); }

.theme-toggle {
  width: 2.5rem; height: 1.5rem; border-radius: 0.75rem;
  background: var(--toggle-bg); border: 1px solid var(--border2);
  cursor: pointer; position: relative;
  transition: background var(--t), border-color var(--t); flex-shrink: 0;
}
.theme-toggle::after {
  content: ''; position: absolute;
  width: 1rem; height: 1rem; border-radius: 50%;
  background: var(--accent); top: 0.1875rem; left: 0.1875rem;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.22s;
}
[data-theme="light"] .theme-toggle::after { transform: translateX(1rem); background: var(--accent2); }
.theme-icon { position: absolute; font-size: 0.6875rem; top: 50%; transform: translateY(-50%); pointer-events: none; }
.icon-moon { right: 0.3125rem; display: var(--moon); }
.icon-sun  { left:  0.3125rem; display: var(--sun); }
.hdr-sep { width: 1px; height: 1.375rem; background: var(--border); flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════ */
main {
  position: relative; z-index: 1;
  padding: 1.5rem 1.5rem 6.25rem;
  max-width: 80rem; margin: 0 auto;
}

/* ═══════════════════════════════════════════════
   LOADING CARD (replaces drop-zone)
═══════════════════════════════════════════════ */
#import-panel { margin-bottom: 1.5rem; }
#loading-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-panel);
  padding: 3.75rem 2rem;
  text-align: center;
  box-shadow: var(--shadow);
  transition: background var(--t), border-color var(--t);
}
.loading-icon  { font-size: 2.5rem; margin-bottom: 1rem; }
.loading-title { font-size: 0.9375rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text); }
.loading-sub   { font-size: 0.8125rem; color: var(--text-muted); line-height: 1.8; }

/* ═══════════════════════════════════════════════
   STATS BAR
═══════════════════════════════════════════════ */
#stats-bar {
  display: none; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center;
}
.stat-chip {
  display: flex; align-items: baseline; gap: 0.5rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 0.625rem; padding: 0.5625rem 1rem; font-size: 0.7812rem;
  transition: background var(--t), border-color var(--t); box-shadow: var(--shadow);
}
.stat-chip .lbl  { color: var(--text-muted); }
.stat-chip .val  { font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9375rem; }
.stat-chip .unit { font-size: 0.6875rem; color: var(--text-muted); }

/* today chip */
#chip-today .val { color: var(--accent); }

/* ═══════════════════════════════════════════════
   TIMETABLE
═══════════════════════════════════════════════ */
#timetable-wrap {
  display: none; border-radius: var(--radius-panel);
  border: 1px solid var(--border); background: var(--surface);
  overflow: hidden; box-shadow: var(--shadow);
  transition: background var(--t), border-color var(--t);
}
.tt-scroll { overflow-x: auto; }
.timetable { width: 100%; border-collapse: collapse; min-width: 26.25rem; table-layout: fixed; }

.timetable thead th {
  background: var(--surface2); height: 2.75rem;
  padding: 0 0.5rem; font-size: 0.75rem; font-weight: 500;
  letter-spacing: 0.05em; color: var(--text-muted); text-align: center;
  border-bottom: 1px solid var(--border);
  transition: background var(--t); white-space: nowrap; overflow: hidden;
}
.timetable thead th.col-time {
  width: var(--time-col); border-right: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  position: sticky; left: 0; z-index: 5;
}
/* 曜日列: table-layout:fixed により残り幅を均等分配、min-width は不要 */
.timetable thead th.col-day { /* width は table が自動計算 */ }
.timetable thead th.today-hdr { color: var(--accent); }

.timetable tbody td {
  vertical-align: top; padding: 0.3125rem;
  height: var(--row-height);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background var(--t);
}
.timetable tbody td.col-time {
  text-align: center; background: var(--surface2);
  border-right: 1px solid var(--border2);
  padding: 0; width: var(--time-col);
  position: sticky; left: 0; z-index: 2;
  transition: background var(--t);
}
.timetable tbody td.col-time.is-now   { background: rgba(124,106,247,0.11); }
.timetable tbody td.col-time.is-break { background: rgba(251,191,36,0.07); }
.timetable tbody tr:last-child td { border-bottom: none; }
.timetable tbody td:last-child    { border-right: none; }

.time-label {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 0.1875rem;
}
.time-num   { font-family: 'DM Mono', monospace; font-size: 1.25rem; font-weight: 500; color: var(--text-dim); }
.time-start { font-size: 0.5938rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.time-end   { font-size: 0.5938rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.time-num.active-num { color: var(--accent); }

/* ═══════════════════════════════════════════════
   COURSE CARD
═══════════════════════════════════════════════ */
.course-card {
  border-radius: var(--radius-card); padding: 0.5625rem 0.6875rem;
  height: calc(var(--row-height) - 0.625rem);
  display: flex; flex-direction: column; justify-content: space-between;
  cursor: pointer; overflow: hidden; position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
}
.course-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 0.1875rem; border-radius: var(--radius-card) var(--radius-card) 0 0;
}
.course-card:hover { transform: translateY(-0.125rem) scale(1.01); box-shadow: var(--shadow-card); z-index: 10; }
.cn { font-size: 0.7812rem; font-weight: 500; color: var(--text); line-height: 1.35; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.cm { display: flex; align-items: center; gap: 0.3125rem; font-size: 0.6562rem; color: var(--text-muted); overflow: hidden; white-space: nowrap; }
.cm-teacher { overflow: hidden; text-overflow: ellipsis; }
.cm-room    { font-family: 'DM Mono', monospace; font-size: 0.625rem; margin-left: auto; flex-shrink: 0; }
/* 週表示用: 教室を最下部中央に */
.cm-room-week {
  font-family: 'DM Mono', monospace;
  font-size: 0.5875rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: auto;
  padding-top: 0.125rem;
  letter-spacing: 0.03em;
  opacity: 0.8;
}
.card-week {
  display: flex;
  flex-direction: column;
}

/* 空セル (クリック可能) */
.cell-empty-clickable {
  cursor: pointer;
  transition: background 0.15s;
}
.cell-empty-clickable:hover {
  background: rgba(124,106,247,0.06) !important;
}
.cell-empty-clickable:hover::after {
  content: '+';
  display: block;
  text-align: center;
  font-size: 1.25rem;
  color: var(--border2);
  margin-top: 0.5rem;
}

/* glow on active period card */
.course-card.card-active {
  box-shadow: 0 0 0 2px var(--accent), var(--shadow-card);
}

/* Color palette */
[data-theme="dark"] .cc-0  { background:rgba(124,106,247,0.20); } [data-theme="dark"] .cc-0::after  { background:#7c6af7; }
[data-theme="dark"] .cc-1  { background:rgba(192,132,252,0.17); } [data-theme="dark"] .cc-1::after  { background:#c084fc; }
[data-theme="dark"] .cc-2  { background:rgba(56,189,248,0.17);  } [data-theme="dark"] .cc-2::after  { background:#38bdf8; }
[data-theme="dark"] .cc-3  { background:rgba(52,211,153,0.17);  } [data-theme="dark"] .cc-3::after  { background:#34d399; }
[data-theme="dark"] .cc-4  { background:rgba(251,191,36,0.17);  } [data-theme="dark"] .cc-4::after  { background:#fbbf24; }
[data-theme="dark"] .cc-5  { background:rgba(248,113,113,0.17); } [data-theme="dark"] .cc-5::after  { background:#f87171; }
[data-theme="dark"] .cc-6  { background:rgba(251,146,60,0.17);  } [data-theme="dark"] .cc-6::after  { background:#fb923c; }
[data-theme="dark"] .cc-7  { background:rgba(163,230,53,0.17);  } [data-theme="dark"] .cc-7::after  { background:#a3e635; }
[data-theme="dark"] .cc-8  { background:rgba(244,114,182,0.17); } [data-theme="dark"] .cc-8::after  { background:#f472b6; }
[data-theme="dark"] .cc-9  { background:rgba(99,102,241,0.20);  } [data-theme="dark"] .cc-9::after  { background:#6366f1; }

[data-theme="light"] .cc-0  { background:rgba(124,106,247,0.10); } [data-theme="light"] .cc-0::after  { background:#7c6af7; }
[data-theme="light"] .cc-1  { background:rgba(192,132,252,0.10); } [data-theme="light"] .cc-1::after  { background:#c084fc; }
[data-theme="light"] .cc-2  { background:rgba(56,189,248,0.10);  } [data-theme="light"] .cc-2::after  { background:#38bdf8; }
[data-theme="light"] .cc-3  { background:rgba(52,211,153,0.10);  } [data-theme="light"] .cc-3::after  { background:#34d399; }
[data-theme="light"] .cc-4  { background:rgba(251,191,36,0.12);  } [data-theme="light"] .cc-4::after  { background:#ca8a04; }
[data-theme="light"] .cc-5  { background:rgba(248,113,113,0.10); } [data-theme="light"] .cc-5::after  { background:#f87171; }
[data-theme="light"] .cc-6  { background:rgba(251,146,60,0.10);  } [data-theme="light"] .cc-6::after  { background:#fb923c; }
[data-theme="light"] .cc-7  { background:rgba(101,163,13,0.10);  } [data-theme="light"] .cc-7::after  { background:#65a30d; }
[data-theme="light"] .cc-8  { background:rgba(244,114,182,0.10); } [data-theme="light"] .cc-8::after  { background:#f472b6; }
[data-theme="light"] .cc-9  { background:rgba(99,102,241,0.10);  } [data-theme="light"] .cc-9::after  { background:#6366f1; }

/* no course today */
#no-today {
  display: none; text-align: center;
  padding: 3.75rem 1.5rem; color: var(--text-muted); font-size: 0.875rem; line-height: 2;
}
#no-today .big { font-size: 2.25rem; margin-bottom: 0.75rem; }

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(0.625rem);
  -webkit-backdrop-filter: blur(0.625rem); z-index: 300;
  align-items: center; justify-content: center; padding: 1.5rem;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 1.25rem; padding: 1.875rem; width: 28.75rem; max-width: 100%;
  position: relative; box-shadow: 0 1.5rem 3.75rem rgba(0,0,0,0.4);
  animation: modalIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
  transition: background var(--t), border-color var(--t);
}
@keyframes modalIn { from { transform:scale(0.92) translateY(12px); opacity:0; } to { transform:none; opacity:1; } }
.modal-close {
  position: absolute; top: 0.875rem; right: 0.875rem;
  width: 1.875rem; height: 1.875rem; border-radius: 0.5rem;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 0.8125rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-color-bar { height: 0.1875rem; border-radius: 0.125rem; margin-bottom: 1.125rem; }
.modal-code { font-family:'DM Mono',monospace; font-size:0.6875rem; padding:0.1875rem 0.625rem; border-radius:1.25rem; display:inline-block; margin-bottom:0.75rem; }
.modal-name { font-size:1.25rem; font-weight:700; line-height:1.3; margin-bottom:1.375rem; color:var(--text); }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.625rem; }
.modal-item { background:var(--surface2); border:1px solid var(--border); border-radius:0.625rem; padding:0.75rem 0.875rem; transition:background var(--t),border-color var(--t); }
.modal-item.full { grid-column:1/-1; }
.modal-lbl { font-size:0.6562rem; color:var(--text-muted); margin-bottom:0.3125rem; letter-spacing:0.04em; }
.modal-val { font-size:0.875rem; color:var(--text); }

/* ═══════════════════════════════════════════════
   COURSE LIST
═══════════════════════════════════════════════ */
#course-list-wrap { display:none; margin-top:1.5rem; }
.sec-title { font-size:0.6875rem; font-weight:500; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.875rem; }

/* 折りたたみトグルボタン */
.course-list-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none; cursor: pointer;
  padding: 0 0 0.875rem; text-align: left;
}
.course-list-toggle:hover .sec-title { color: var(--accent); }

/* 授業名セルのズレ防止 */
.course-name-cell {
  display: flex; align-items: center; gap: 0.4375rem;
}
.tbl-wrap { border:1px solid var(--border); border-radius:var(--radius-panel); overflow:hidden; box-shadow:var(--shadow); }
.course-tbl { width:100%; border-collapse:collapse; font-size:0.8125rem; }
.course-tbl thead th { text-align:left; padding:0.625rem 0.875rem; font-size:0.6875rem; font-weight:500; color:var(--text-muted); letter-spacing:0.05em; border-bottom:1px solid var(--border); background:var(--surface2); white-space:nowrap; transition:background var(--t); }
.course-tbl tbody { background:var(--surface); transition:background var(--t); }
.course-tbl tbody td { padding:0.6875rem 0.875rem; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; transition:background var(--t); }
.course-tbl tbody tr:last-child td { border-bottom:none; }
.course-tbl tbody tr:hover td { background:rgba(124,106,247,0.04); }
.badge { display:inline-block; font-family:'DM Mono',monospace; font-size:0.6562rem; padding:0.1875rem 0.5rem; border-radius:0.3125rem; }
.badge-code   { background:var(--surface2); color:var(--accent3); border:1px solid var(--border); }
.badge-credit { background:rgba(124,106,247,0.12); color:var(--accent); }
.dot { display:inline-block; width:0.5rem; height:0.5rem; border-radius:50%; margin-right:0.4375rem; flex-shrink:0; }
.err-box { margin-top:0.625rem; background:rgba(248,113,113,0.07); border:1px solid rgba(248,113,113,0.25); border-radius:0.625rem; padding:0.75rem 1rem; font-size:0.75rem; color:var(--danger); display:flex; flex-direction:column; gap:0.25rem; }

/* ═══════════════════════════════════════════════
   TEST MODE PANEL — floating, hidden by default
═══════════════════════════════════════════════ */
#testmode-panel {
  display: none;                   /* JS reveals on trigger */
  flex-direction: column;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9000;
  width: 340px;
  background: #0a0a10;
  border: 1px solid #fbbf2455;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(251,191,36,0.08);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #e0e0e8;
  /* subtle amber glow */
  filter: drop-shadow(0 0 18px rgba(251,191,36,0.18));
}

/* light-mode: keep the panel always dark for contrast */
[data-theme="light"] #testmode-panel {
  background: #111118;
  border-color: #fbbf2466;
}

#tm-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(251,191,36,0.08);
  border-bottom: 1px solid #fbbf2430;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
#tm-header:hover { background: rgba(251,191,36,0.14); }

#tm-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  background: rgba(251,191,36,0.18);
  color: #fbbf24;
  border: 1px solid #fbbf2455;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
#tm-display {
  flex: 1;
  font-size: 12px;
  color: #9898b0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#tm-arrow {
  font-size: 10px;
  color: #60607a;
  flex-shrink: 0;
}

#tm-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 14px;
}

.tm-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.tm-lbl {
  font-size: 10px;
  color: #60607a;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.tm-ctrl {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.tm-btn {
  background: #1e1e28;
  border: 1px solid #333348;
  color: #9898b0;
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.tm-btn:hover { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.07); }
.tm-btn:active { transform: scale(0.96); }

.tm-select {
  background: #1e1e28;
  border: 1px solid #333348;
  color: #e0e0e8;
  border-radius: 6px;
  padding: 5px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  outline: none;
  cursor: pointer;
  flex: 1;
  min-width: 100px;
}
.tm-select:focus { border-color: #fbbf24; }

.tm-input {
  background: #1e1e28;
  border: 1px solid #333348;
  color: #fbbf24;
  border-radius: 6px;
  padding: 5px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  width: 46px;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
.tm-input::-webkit-inner-spin-button,
.tm-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.tm-input:focus { border-color: #fbbf24; }
.tm-sep { color: #60607a; font-size: 16px; font-weight: 300; }

.tm-presets {
  gap: 5px;
}
.tm-preset {
  background: #16161d;
  border: 1px solid #28283a;
  color: #9898b0;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 10.5px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.tm-preset:hover { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.06); }

.tm-actions {
  display: flex;
  gap: 6px;
  padding-top: 4px;
  border-top: 1px solid #28283a;
}
.tm-apply { border-color: #7c6af7; color: #a89ef8; flex: 1; justify-content: center; }
.tm-apply:hover { background: rgba(124,106,247,0.12) !important; border-color: #7c6af7 !important; color: #a89ef8 !important; }
.tm-reset { color: #60607a; }
.tm-close { color: #f87171; border-color: rgba(248,113,113,0.3); }
.tm-close:hover { background: rgba(248,113,113,0.08) !important; border-color: #f87171 !important; color: #f87171 !important; }

/* banner map button */
.bn-map-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 7px;
  font-size: 11.5px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: inherit;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.bn-map-btn:hover { background: rgba(255,255,255,0.15); }

/* modal floormap button */
.btn-floormap {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 11px 16px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--accent3);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-floormap:hover { border-color: var(--accent3); background: rgba(56,189,248,0.08); }

/* ─── Floor Map Overlay ─── */
#floormap-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 9999;           /* modal(300)・header(200)・testpanel(9000) より上 */
  align-items: center;
  justify-content: center;
  padding: 1.25rem;
  overflow: auto;
}
#floormap-overlay.open {
  display: flex;
  /* flex で中央揃え確実に */
  align-items: center;
  justify-content: center;
}

#floormap-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1.125rem;
  width: min(45rem, 100%);
  max-height: calc(100vh - 2.5rem);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 2rem 5rem rgba(0,0,0,0.6);
  animation: modalIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
  transition: background var(--t), border-color var(--t);
  position: relative;      /* ×ボタンの absolute 基準 */
  flex-shrink: 0;
}

#fm-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.125rem 1.375rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#fm-title {
  font-size: 0.9375rem;
  font-weight: 700;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
}
#fm-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.1875rem;
}
.fm-close {
  width: 1.875rem; height: 1.875rem;
  border-radius: 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.8125rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.fm-close:hover { color: var(--text); border-color: var(--accent); }

#fm-body {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background: var(--surface2);
}
#fm-img {
  max-width: 100%;
  max-height: calc(90vh - 7.5rem);
  border-radius: 0.5rem;
  object-fit: contain;
  display: block;
}
.fm-err {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8125rem;
  line-height: 2;
  padding: 2.5rem;
}
.fm-err small { font-family: 'DM Mono', monospace; font-size: 0.6875rem; }

/* ── WEEK VIEW extras ── */
.timetable thead th.col-day { min-width: 6.875rem; }
.timetable thead th.today-hdr { color: var(--accent); background: rgba(124,106,247,0.06); }
.timetable tbody td.today-col { background: rgba(124,106,247,0.03); }
[data-theme="light"] .timetable tbody td.today-col { background: rgba(124,106,247,0.04); }
.hdr-day-en {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.5625rem;
  letter-spacing: 0.06em;
  opacity: 0.55;
  margin-top: 0.125rem;
}

/* ═══════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
   html clamp font-size が全 rem の基準:
     20rem → 0.875rem, 48rem+ → 1rem
   ブレークポイントは rem で指定し DPI に依存しない
═══════════════════════════════════════════════ */

/* ── タブレット縦 (30.0625rem〜47.9375rem ≒ 30.0625rem〜47.9375rem) ── */
@media (min-width: 30.0625rem) and (max-width: 47.9375rem) {
  :root {
    --row-height:   5.75rem;
    --time-col:     4rem;
    --header-h:     3.5rem;
  }
  main { padding: 1rem 1rem 5rem; }
  .timetable thead th.col-day { min-width: 7rem; }
}

/* ── モバイル (〜30rem ≒ 30rem) ── */
@media (max-width: 30rem) {
  :root {
    --row-height:   6.25rem;
    --time-col:     3.25rem;
    --header-h:     3.25rem;
    --radius-panel: 0.625rem;
  }

  /* Header */
  header { padding: 0 0.75rem; gap: 0.375rem; }
  .logo  { font-size: 0.875rem; }
  .logo span { display: none; }
  .header-right { gap: 0.375rem; }
  .hdr-sep { display: none; }
  #btn-view { font-size: 0; padding: 0.5rem 0.625rem; gap: 0; }
  #btn-view::before { content: '📅'; font-size: 1rem; }
  #btn-reload2 { display: none !important; }

  /* Banner */
  #next-banner {
    height: auto;
    min-height: 3.5rem;
    padding: 0.625rem 0.875rem;
    flex-wrap: wrap;
    gap: 0.375rem 0.625rem;
  }
  .banner-pill   { font-size: 0.5625rem; padding: 0.125rem 0.4375rem; }
  .banner-label  { font-size: 0.6875rem; }
  .banner-course { font-size: 0.9375rem; font-weight: 700; }
  .banner-main   { width: 100%; order: 1; gap: 0.375rem; }
  .banner-loc    { font-size: 0.75rem; order: 2; flex-basis: 100%; opacity: 1; }
  .banner-time   { font-size: 0.6875rem; order: 3; }
  #bn-map-btn    { order: 4; margin-left: auto; font-size: 0.75rem; padding: 0.3125rem 0.625rem; }
  .banner-dot    { order: 0; }

  /* Main */
  main { padding: 0.875rem 0.625rem 5rem; }

  /* Stats bar */
  #stats-bar {
    gap: 0.5rem;
    margin-bottom: 0.875rem;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 0.125rem;
    -webkit-overflow-scrolling: touch;
  }
  #stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    padding: 0.4375rem 0.75rem;
    font-size: 0.71875rem;
    flex-shrink: 0;
    border-radius: 0.5rem;
  }
  .stat-chip .val { font-size: 0.875rem; }

  /* Timetable */
  #timetable-wrap { border-radius: var(--radius-panel); }
  .timetable { min-width: 0; }
  .timetable thead th {
    height: 2.375rem;
    font-size: 0.8125rem;
    padding: 0 0.5rem;
  }
  .timetable thead th.col-day { min-width: 0; }
  .hdr-day-en { display: none; }
  .timetable tbody td { padding: 0.3125rem; height: var(--row-height); }
  .timetable tbody td.col-time { width: var(--time-col); }
  .time-num   { font-size: 1.125rem; }
  .time-start,
  .time-end   { font-size: 0.5625rem; }

  /* Course card */
  .course-card {
    padding: 0.625rem 0.6875rem;
    height: calc(var(--row-height) - 0.625rem);
    border-radius: 0.5rem;
    gap: 0;
  }
  .cn {
    font-size: 0.875rem;
    font-weight: 600;
    line-height: 1.3;
    -webkit-line-clamp: 3;
  }
  .cm      { font-size: 0.75rem; margin-top: 0.3125rem; }
  .cm-room { font-size: 0.6875rem; }

  /* Course list */
  .course-tbl { font-size: 0.75rem; }
  .course-tbl thead th,
  .course-tbl tbody td { padding: 0.5625rem 0.625rem; }

  /* Modal — 1列に */
  #modal { padding: 1.25rem; border-radius: 1rem; }
  .modal-name { font-size: 1.125rem; }
  .modal-grid { grid-template-columns: 1fr; }
  .modal-item.full { grid-column: 1; }

  /* Floor map modal */
  #floormap-modal { border-radius: 0.875rem; }
  #fm-header { padding: 0.875rem 1rem; }
  #fm-title  { font-size: 0.8125rem; }
  #fm-sub    { font-size: 0.6875rem; }

  /* Test mode panel */
  #testmode-panel { width: calc(100vw - 1.5rem); right: 0.75rem; bottom: 0.75rem; }
}

/* 極小画面 (〜20rem ≒ 20rem) */
@media (max-width: 20rem) {
  :root { --time-col: 2.875rem; --row-height: 5.5rem; }
  .cn { font-size: 0.8125rem; }
  .cm { font-size: 0.6875rem; }
  header { padding: 0 0.5rem; }
}

/* ═══════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════ */
#login-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--bg);
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  transition: background var(--t);
}
#login-screen.active { display: flex; }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1.25rem;
  padding: 2.5rem 2rem;
  width: min(24rem, 100%);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  animation: modalIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
}
.login-logo {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 1.5rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  background: linear-gradient(130deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.25rem;
}
.login-sub {
  text-align: center;
  font-size: 0.8125rem;
  color: var(--text-muted);
  margin-top: -0.75rem;
}
.login-field {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}
.login-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.03em;
}
.login-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.625rem;
  padding: 0.75rem 1rem;
  font-size: 0.9375rem;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background var(--t);
  width: 100%;
}
.login-input:focus { border-color: var(--accent); }
.login-input::placeholder { color: var(--text-muted); }
.login-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 0.625rem;
  padding: 0.8125rem;
  font-size: 0.9375rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s;
  width: 100%;
  margin-top: 0.25rem;
}
.login-btn:hover  { background: #8f7fff; transform: translateY(-1px); }
.login-btn:active { transform: none; }
.login-err {
  font-size: 0.8125rem;
  color: var(--danger);
  text-align: center;
  min-height: 1.2em;
}
.login-register-link {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.login-register-link button {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Noto Sans JP', sans-serif;
  text-decoration: underline;
  padding: 0;
}
.login-id-hint {
  font-size: 0.6875rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: 0.1rem;
}
.login-id-hint strong {
  color: var(--accent);
  font-weight: 600;
}
/* ログアウトボタン */
#btn-logout {
  font-size: 0.75rem;
  padding: 0.375rem 0.75rem;
  color: var(--text-muted);
  border-color: var(--border);
}
#btn-logout:hover { color: var(--danger); border-color: var(--danger); }
/* ユーザー表示 */
.user-chip {
  display: none;
  align-items: center;
  gap: 0.375rem;
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
  padding: 0.375rem 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  white-space: nowrap;
}

/* ── TOAST / MISC ── */
#toast {
  position:fixed; bottom:1.75rem; left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:0.75rem; padding:0.6875rem 1.25rem; font-size:0.8125rem; color:var(--text);
  z-index:999; white-space:nowrap; box-shadow:var(--shadow);
  opacity:0; transition:transform 0.32s cubic-bezier(0.34,1.5,0.64,1), opacity 0.28s;
  pointer-events:none;
}
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.spinner { display:inline-block; width:0.9375rem; height:0.9375rem; border:0.125rem solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
/* ═══════════════════════════════════════════════
   ASSIGNMENTS
═══════════════════════════════════════════════ */
#assignments-list { display: flex; flex-direction: column; gap: 0.5rem; }
.assign-item {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 0.625rem; padding: 0.75rem 1rem;
  box-shadow: var(--shadow);
  transition: background var(--t), border-color var(--t);
  cursor: default;
}
.assign-item.overdue { border-color: rgba(248,113,113,0.5); background: rgba(248,113,113,0.04); }
.assign-dot { width:0.5rem; height:0.5rem; border-radius:50%; flex-shrink:0; background: var(--accent); }
.assign-item.overdue .assign-dot { background: var(--danger); }
.assign-body { flex:1; min-width:0; }
.assign-course { font-size:0.6875rem; color:var(--text-muted); margin-bottom:0.125rem; }
.assign-title  { font-size:0.875rem; font-weight:500; color:var(--text); }
.assign-due    { font-size:0.6875rem; font-family:'DM Mono',monospace; color:var(--text-muted); margin-top:0.125rem; }
.assign-due.near { color: var(--warning); }
.assign-due.over { color: var(--danger); }
.assign-check {
  width:1.75rem; height:1.75rem; border-radius:0.375rem;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-muted); font-size:0.875rem;
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition: all 0.15s;
}
.assign-check:hover { border-color: var(--success); color: var(--success); }
.assign-empty { text-align:center; padding:2rem 1rem; color:var(--text-muted); font-size:0.875rem; }

/* 休講バッジ (時間割カード) */
.card-cancelled {
  position: absolute; top:0.25rem; right:0.25rem;
  background: rgba(248,113,113,0.18);
  border: 1px solid rgba(248,113,113,0.4);
  color: var(--danger);
  font-size: 0.5625rem; font-weight:600; letter-spacing:0.04em;
  padding: 0.0625rem 0.3125rem; border-radius: 0.25rem;
}
.course-card.is-cancelled { opacity: 0.55; }
.course-card.is-cancelled .cn { text-decoration: line-through; }

/* ═══════════════════════════════════════════════
   SIMPLE MODALS (休講・課題)
═══════════════════════════════════════════════ */
.simple-overlay {
  display: none; position: fixed; inset:0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(0.5rem);
  z-index: 400; align-items:center; justify-content:center; padding:1.5rem;
}
.simple-overlay.open { display: flex; }
.simple-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 1.125rem; padding: 1.75rem 1.5rem;
  width: min(22rem, 100%); position:relative;
  box-shadow: 0 1.5rem 3.75rem rgba(0,0,0,0.4);
  animation: modalIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
  transition: background var(--t), border-color var(--t);
  max-height: 90vh; overflow-y: auto;
}
.simple-modal-title { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:1.25rem; }
.simple-modal-body  { display:flex; flex-direction:column; gap:0.75rem; }
.sfield { display:flex; flex-direction:column; gap:0.3rem; }
.slabel { font-size:0.75rem; font-weight:500; color:var(--text-dim); }
.sinput {
  background: var(--surface2); border:1px solid var(--border);
  border-radius:0.5rem; padding:0.625rem 0.75rem;
  font-size:0.875rem; font-family:'Noto Sans JP',sans-serif;
  color: var(--text); outline:none;
  transition: border-color 0.15s, background var(--t);
  width:100%;
}
.sinput:focus { border-color: var(--accent); }
.ssubmit {
  background: var(--accent); color:#fff; border:none;
  border-radius:0.5rem; padding:0.6875rem; font-size:0.875rem;
  font-family:'Noto Sans JP',sans-serif; font-weight:500;
  cursor:pointer; transition: background 0.15s, transform 0.12s; width:100%;
}
.ssubmit:hover  { background:#8f7fff; transform:translateY(-1px); }
.ssubmit-danger { background: rgba(248,113,113,0.15); color:var(--danger); border:1px solid rgba(248,113,113,0.3); }
.ssubmit-danger:hover { background:rgba(248,113,113,0.25); transform:translateY(-1px); }
.sfield-err { font-size:0.8125rem; color:var(--danger); min-height:1em; }

/* 休講リスト */
.cc-list-item {
  display:flex; align-items:center; gap:0.5rem;
  padding:0.5rem 0.625rem; background:var(--surface2);
  border:1px solid var(--border); border-radius:0.5rem; font-size:0.8125rem;
}
.cc-list-item .cc-info { flex:1; }
.cc-list-item button { background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.875rem; padding:0 0.25rem; }

/* 提出済みリスト */
.done-item {
  padding:0.625rem 0.75rem; background:var(--surface2);
  border:1px solid var(--border); border-radius:0.5rem;
  margin-bottom:0.5rem;
}
.done-item-course { font-size:0.6875rem; color:var(--text-muted); }
.done-item-title  { font-size:0.875rem; font-weight:500; color:var(--text); }
.done-restore {
  font-size:0.75rem; color:var(--accent); background:none; border:none;
  cursor:pointer; text-decoration:underline; margin-top:0.25rem; padding:0;
  font-family:'Noto Sans JP',sans-serif;
}

/* 課題追加ボタン (提出済み閲覧) */
#btn-show-done {
  font-size:0.75rem; color:var(--text-muted); background:var(--surface2);
  border:1px solid var(--border); border-radius:0.375rem;
  padding:0.3125rem 0.75rem; cursor:pointer; transition:all 0.15s;
  margin-top:0.5rem; font-family:'Noto Sans JP',sans-serif;
}
#btn-show-done:hover { border-color:var(--accent); color:var(--accent); }

.cs-takers-box {
  display: flex; align-items: baseline; gap: 0.375rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 0.5rem; padding: 0.625rem 0.875rem;
  margin-bottom: 0.25rem;
}
.cs-takers-label { font-size: 0.75rem; color: var(--text-muted); flex: 1; }
.cs-takers-count { font-family: 'DM Mono', monospace; font-size: 1.25rem; font-weight: 600; color: var(--accent); }
.cs-takers-unit  { font-size: 0.75rem; color: var(--text-muted); }

/* 休日ラベル */
.holiday-chip {
  font-size:0.6875rem; color:var(--danger); opacity:0.8;
  background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25);
  border-radius:0.375rem; padding:0.125rem 0.4375rem;
  margin-left:0.5rem; vertical-align:middle;
}

/* ═══════════════════════════════════════════════
   HAMBURGER MENU
═══════════════════════════════════════════════ */
.hamburger-btn {
  display: none; /* デスクトップでは非表示 */
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.3125rem;
  width: 2.25rem;
  height: 2.25rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
  padding: 0;
}
.hamburger-btn:hover { border-color: var(--accent); }
.hamburger-btn span {
  display: block;
  width: 1rem;
  height: 0.125rem;
  background: var(--text-dim);
  border-radius: 0.125rem;
  transition: background 0.15s;
}
.hamburger-btn.open span { background: var(--accent); }

/* ドロップダウン本体 */
.hamburger-menu {
  display: none;
  position: fixed;
  top: calc(var(--header-h) + 0.5rem);
  right: 0.75rem;
  z-index: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.875rem;
  box-shadow: var(--shadow-card);
  min-width: 13rem;
  overflow: hidden;
  animation: menuIn 0.18s cubic-bezier(0.34,1.4,0.64,1);
  transition: background var(--t), border-color var(--t);
}
@keyframes menuIn {
  from { opacity:0; transform:translateY(-0.5rem) scale(0.96); }
  to   { opacity:1; transform:none; }
}
.hamburger-menu.open { display: block; }

.hmenu-user {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.875rem 1rem 0.75rem;
}
.hmenu-user-icon { font-size: 1rem; }
.hmenu-user-id {
  font-family: 'DM Mono', monospace;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.04em;
}

.hmenu-divider {
  height: 1px;
  background: var(--border);
  margin: 0.25rem 0;
}

.hmenu-item {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  width: 100%;
  padding: 0.75rem 1rem;
  background: none;
  border: none;
  font-size: 0.875rem;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: background 0.12s;
}
.hmenu-item:hover { background: var(--surface2); }
.hmenu-danger {
  color: var(--danger);
  opacity: 0.85;
}
.hmenu-danger:hover {
  background: rgba(248,113,113,0.08);
  opacity: 1;
}

/* バックドロップ */
#hamburger-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 499;
}
#hamburger-backdrop.open { display: block; }

/* デスクトップでは hamburger を常時表示 */
@media (min-width: 30.0625rem) {
  .hamburger-btn { display: flex; }
}

/* モバイルでは desktop-only 要素を隠す (JS の display 操作より優先) */
@media (max-width: 30rem) {
  .hamburger-btn { display: flex; }
  .desktop-only  { display: none !important; }
  /* open クラスが付いたときは表示を許可 */
  #hamburger-menu.open     { display: block !important; }
  #hamburger-backdrop.open { display: block !important; }
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen">
  <div class="login-card" id="login-card">
    <!-- ログイン / 登録 を JS で切り替え -->
    <div class="login-logo">CAMPUS</div>
    <div class="login-sub" id="login-mode-label">学籍番号でログイン</div>

    <div class="login-field">
      <label class="login-label" for="inp-id">学籍番号</label>
      <input class="login-input" id="inp-id" type="text"
        placeholder="00X0000" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('inp-pw').focus()">
      <span class="login-id-hint">※ 書式: 数字2桁＋<strong>大文字アルファベット</strong>1文字＋数字4桁（例: 24A1234）</span>
    </div>
    <div class="login-field">
      <label class="login-label" for="inp-pw">パスワード</label>
      <input class="login-input" id="inp-pw" type="password"
        placeholder="パスワードを入力"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loginSubmit()">
    </div>

    <div class="login-err" id="login-err"></div>

    <button class="login-btn" id="login-submit-btn" onclick="loginSubmit()">ログイン</button>

    <div class="login-register-link">
      初めて使う場合は
      <button onclick="switchLoginMode()">新規登録</button>
    </div>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">CAMPUS <span>時間割</span></div>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-view"   style="display:none" onclick="toggleView()">📅 週表示</button>
    <!-- デスクトップ専用: ユーザーチップ・ログアウト・テーマ -->
    <div class="hdr-sep desktop-only" id="sep-user" style="display:none"></div>
    <span class="user-chip desktop-only" id="user-chip">👤 <span id="user-id-display"></span></span>
    <button class="btn btn-ghost desktop-only" id="btn-logout" style="display:none" onclick="doLogout()">ログアウト</button>
    <div class="hdr-sep desktop-only"></div>

      <span class="theme-icon icon-moon">🌙</span>
      <span class="theme-icon icon-sun">☀️</span>
    </div>

    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleHamburger()" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ハンバーガードロップダウンメニュー -->
<div id="hamburger-menu" class="hamburger-menu">
  <div class="hmenu-user" id="hmenu-user" style="display:none">
    <span class="hmenu-user-icon">👤</span>
    <span class="hmenu-user-id" id="hmenu-user-id"></span>
  </div>
  <div class="hmenu-divider" id="hmenu-div-user" style="display:none"></div>
  <button class="hmenu-item" onclick="toggleTheme(); closeHamburger()">
    <span id="hmenu-theme-icon">🌙</span> テーマ切替
  </button>
  <button class="hmenu-item" id="hmenu-logout" style="display:none" onclick="doLogout(); closeHamburger()">
    🚪 ログアウト
  </button>
  <!-- 管理者専用 (26X2004) -->
  <div class="hmenu-divider hmenu-admin-only" id="hmenu-div-admin" style="display:none"></div>

  <div class="hmenu-divider" id="hmenu-div-danger" style="display:none"></div>

  </button>
</div>
<div id="hamburger-backdrop" onclick="closeHamburger()"></div>

<!-- ═══ NEXT-CLASS BANNER ═══ -->
<div id="next-banner">

  <span class="banner-pill" id="bn-pill">NEXT</span>

  </button>

<!-- ═══ MAIN ═══ -->

<div id="toast"></div>

<script>
'use strict';

/* ─────────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────────── */
const DAYS   = ['Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_JA = { Mon:'月', Tue:'火', Wed:'水', Thu:'木', Fri:'金', Sat:'土' };
const JS_DAY = { 0:null, 1:'Mon', 2:'Tue', 3:'Wed', 4:'Thu', 5:'Fri', 6:'Sat' };

/*
  時限計算:
  授業 100分、休憩 10分、昼休みは3限開始を 13:20 に固定
  1限  9:00 → 10:40
  休憩       10:40 → 10:50
  2限 10:50 → 12:30
  昼休み     12:30 → 13:20
  3限 13:20 → 15:00
  休憩       15:00 → 15:10
  4限 15:10 → 16:50
  休憩       16:50 → 17:00
  5限 17:00 → 18:40
  休憩       18:40 → 18:50
  6限 18:50 → 20:30
  7限 なし
*/
const PERIODS = [1,2,3,4,5,6];
const PERIOD_START_MIN = {
  1:  9*60+0,
  2: 10*60+50,
  3: 13*60+20,
  4: 15*60+10,
  5: 17*60+0,
  6: 18*60+50
};
const CLASS_DURATION = 100; // minutes

function periodEndMin(p)   { return PERIOD_START_MIN[p] + CLASS_DURATION; }
function fmtMin(m)         { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function periodStartStr(p) { return fmtMin(PERIOD_START_MIN[p]); }
function periodEndStr(p)   { return fmtMin(periodEndMin(p)); }

const PALETTE = [
  '#7c6af7','#c084fc','#38bdf8','#34d399',
  '#fbbf24','#f87171','#fb923c','#a3e635','#f472b6','#6366f1'
];

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let courses  = [];
let colorMap = {};
let errors   = [];
let listOpen = true;
let lastSrc  = '';
let _bannerTimer = null;
let _tickTimer   = null;

/* ─────────────────────────────────────────────
   THEME
───────────────────────────────────────────── */
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('campus-theme', next);
}
(function() {
  // デフォルト: light。localStorage に保存済みならそちらを優先
  const s = localStorage.getItem('campus-theme') || 'light';
  document.documentElement.dataset.theme = s;
})();

/* ─────────────────────────────────────────────
   FILE HANDLING
───────────────────────────────────────────── */
/* ─────────────────────────────────────────────
   FILE LOADING  — time.xlsx (same folder, fixed)
───────────────────────────────────────────── */

// 同フォルダのファイルへの絶対URLを確実に返す
// URL オブジェクトで解決するため GitHub Pages・file:// どちらでも動作
function sameDir(filename) {
  // import.meta は使えないので location を基準にする
  // pathname の末尾がファイル名なら除去、ディレクトリなら維持
  const base = location.href.split('?')[0].split('#')[0]; // クエリ・ハッシュ除去
  const dir  = base.endsWith('/') ? base : base.substring(0, base.lastIndexOf('/') + 1);
  return dir + filename;
}

function floorMapSrc(key) {
  return sameDir(key + '.png');
}

// Load time.xlsx unconditionally on startup
async function loadTimeXlsx() {
  setLoadingState('loading');
  const url = sameDir('time.xlsx');
  try {
    // Try fetch first (works on http/https and some file:// setups)
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const buf  = await res.arrayBuffer();
    const wb   = XLSX.read(buf, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    parseAndRender(data);
  } catch (fetchErr) {
    // Fallback: XMLHttpRequest (sometimes works on file://)
    try {
      const buf = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.onload  = () => xhr.status < 400 ? resolve(xhr.response) : reject(new Error(`XHR ${xhr.status}`));
        xhr.onerror = () => reject(new Error('XHR network error'));
        xhr.send();
      });
      const wb   = XLSX.read(buf, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      parseAndRender(data);
    } catch (xhrErr) {
      setLoadingState('error', `time.xlsx の読み込みに失敗しました。同フォルダに time.xlsx を配置してください。\n（${xhrErr.message}）`);
    }
  }
}

function setLoadingState(state, msg) {
  const icon  = document.getElementById('loading-icon');
  const title = document.getElementById('loading-title');
  const sub   = document.getElementById('loading-sub');
  if (!icon) return;
  if (state === 'loading') {
    icon.textContent  = '⏳';
    title.textContent = 'time.xlsx を読み込んでいます…';
    sub.textContent   = '同フォルダの授業データを取得中です';
  } else if (state === 'error') {
    icon.textContent  = '❌';
    title.textContent = '読み込みに失敗しました';
    sub.innerHTML     = esc(msg).replace(/\n/g,'<br>') +
      '<br><br><button class="btn btn-ghost" onclick="loadTimeXlsx()" style="margin-top:4px">🔄 再試行</button>';
  }
}

function reloadData() { loadTimeXlsx(); }

/* ─────────────────────────────────────────────
   PARSE
   Format: コード|名|担当者|曜日|時間|建物|場所|単位
───────────────────────────────────────────── */
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }

function parseAndRender(rows) {
  const parsed = [], errs = [];
  let start = 0;
  if (rows.length > 0) {
    const c0 = String(rows[0][0]||'').toLowerCase();
    if (c0.includes('コード')||c0.includes('code')||c0.includes('授業')||c0==='') start=1;
  }
  for (let i = start; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.every(c => c===''||c==null)) continue;
    const code     = String(r[0]||'').trim();
    const name     = String(r[1]||'').trim();
    const teacher  = String(r[2]||'').trim();
    const dayRaw   = String(r[3]||'').trim();
    const timeRaw  = String(r[4]||'').trim();
    const building = String(r[5]||'').trim();
    const room     = String(r[6]||'').trim();
    const credits  = Number(r[7]) || 0;
    if (!name) continue;

    const slots = [];
    for (const tok of timeRaw.split(/[,、\s]+/).filter(Boolean)) {
      const full = tok.match(/^(Mon|Tue|Wed|Thu|Fri|Sat)-([1-6])$/i);
      const num  = tok.match(/^([1-6])$/);
      if (full) {
        const d = cap(full[1]), p = parseInt(full[2]);
        if (DAYS.includes(d)) slots.push({ day:d, period:p });
        else errs.push(`行${i+1} [${name}]: 曜日不正 ${tok}`);
      } else if (num && dayRaw) {
        const d = cap(dayRaw);
        if (DAYS.includes(d)) slots.push({ day:d, period:parseInt(num[1]) });
        else errs.push(`行${i+1} [${name}]: 曜日不正 ${dayRaw}`);
      } else if (tok) {
        errs.push(`行${i+1} [${name}]: フォーマット不正 "${tok}"`);
      }
    }
    parsed.push({ code, name, teacher, dayRaw, timeRaw, building, room, credits, slots });
  }
  if (!parsed.length) { showToast('⚠️ 授業データが見つかりませんでした'); return; }

  const keys = [...new Set(parsed.map(c => c.code||c.name))];
  keys.forEach((k,i) => { colorMap[k] = i % 10; });
  courses = parsed;
  errors  = errs;
  renderAll();
  showToast(`✅ ${parsed.length}件の科目を読み込みました`);
}

/* ─────────────────────────────────────────────
   TIME HELPERS  (real + test-mode override)
───────────────────────────────────────────── */

// Test mode state — never touches real clock
const TEST = {
  active:  false,
  dayKey:  null,   // e.g. 'Mon'
  minutes: 0,      // minutes since midnight
};

function nowMin() {
  if (TEST.active) return TEST.minutes;
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}
function todayKey() {
  if (TEST.active) return TEST.dayKey;
  const d = new Date();
  if (isHolidayDate(d)) return null; // 休日は授業なし
  return JS_DAY[d.getDay()];
}

function isBreak(p) {
  if (p >= 6) return false;
  const nm = nowMin();
  return nm > periodEndMin(p) && nm < PERIOD_START_MIN[p+1];
}

/* ─────────────────────────────────────────────
   CURRENT SESSION USER
───────────────────────────────────────────── */
function currentUserId() {
  const s = getSession();
  return s ? s.id : null;
}
const ADMIN_ID = '26X2004';
function isAdmin() { return currentUserId() === ADMIN_ID; }

/* ─────────────────────────────────────────────
   HOLIDAY DETECTION
   Rules (academic year, year-agnostic by month/day):
   - 日曜日 (always)
   - 4/28〜5/6
   - 8/2〜9/17
   - 11/3
   - 12/24〜1/7
   - 1/11, 1/16
   - 2月全日程
   - 3月全日程
───────────────────────────────────────────── */
function isHolidayDate(date) {
  const d  = new Date(date);
  const dw = d.getDay();   // 0=Sun
  const mo = d.getMonth() + 1; // 1-12
  const dy = d.getDate();

  // 日曜
  if (dw === 0) return true;

  // 4/28〜5/6
  if (mo === 4 && dy >= 28) return true;
  if (mo === 5 && dy <= 6)  return true;

  // 8/2〜9/17
  if (mo === 8 && dy >= 2)  return true;
  if (mo === 9 && dy <= 17) return true;

  // 11/3
  if (mo === 11 && dy === 3) return true;

  // 12/24〜1/7
  if (mo === 12 && dy >= 24) return true;
  if (mo === 1  && dy <= 7)  return true;

  // 1/11, 1/16
  if (mo === 1 && (dy === 11 || dy === 16)) return true;

  // 2月・3月全日程
  if (mo === 2 || mo === 3) return true;

  return false;
}

// todayKey で今日が休日かどうか
function isTodayHoliday() {
  return isHolidayDate(new Date());
}

/* ─────────────────────────────────────────────
   CANCEL CLASS  (休講設定)
   Storage key: campus_cancel  { "YYYY-MM-DD:P": { note } }
───────────────────────────────────────────── */
const CANCEL_KEY = 'campus_cancel';

function getCancels() {
  try { return JSON.parse(localStorage.getItem(CANCEL_KEY) || '{}'); }
  catch { return {}; }
}
function saveCancels(obj) { localStorage.setItem(CANCEL_KEY, JSON.stringify(obj)); }

function cancelKey(date, period) { return `${date}:${period}`; }

function isCancelled(date, period) {
  return !!getCancels()[cancelKey(date, period)];
}

// 今日の日付文字列 YYYY-MM-DD
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function openCancelClassModal() {
  document.getElementById('cc-date').value = todayStr();
  document.getElementById('cc-period').value = '';
  document.getElementById('cc-note').value = '';
  document.getElementById('cc-err').textContent = '';
  renderCancelList();
  document.getElementById('cancel-class-overlay').classList.add('open');
}
function closeCancelClassModal() {
  document.getElementById('cancel-class-overlay').classList.remove('open');
}

function addCancelClass() {
  const date   = document.getElementById('cc-date').value;
  const period = document.getElementById('cc-period').value;
  const note   = document.getElementById('cc-note').value.trim();
  const err    = document.getElementById('cc-err');
  err.textContent = '';
  if (!date)   { err.textContent = '日付を選択してください'; return; }
  if (!period) { err.textContent = '時限を選択してください'; return; }
  const cancels = getCancels();
  cancels[cancelKey(date, period)] = { note };
  saveCancels(cancels);
  renderCancelList();
  renderTimetable();
  showToast(`🚫 ${date} ${period}限を休講に設定しました`);
}

function removeCancelClass(key) {
  const cancels = getCancels();
  delete cancels[key];
  saveCancels(cancels);
  renderCancelList();
  renderTimetable();
}

function renderCancelList() {
  const wrap = document.getElementById('cc-list');
  const cancels = getCancels();
  const keys = Object.keys(cancels).sort();
  if (!keys.length) { wrap.innerHTML = '<div style="font-size:0.8125rem;color:var(--text-muted);text-align:center;padding:0.5rem">設定なし</div>'; return; }
  wrap.innerHTML = '';
  keys.forEach(k => {
    const [date, period] = k.split(':');
    const note = cancels[k].note;
    const div = document.createElement('div');
    div.className = 'cc-list-item';
    div.innerHTML = `<div class="cc-info">${date} ${period}限${note ? ' — ' + esc(note) : ''}</div>
      <button onclick="removeCancelClass('${k}')">✕</button>`;
    wrap.appendChild(div);
  });
}

/* ─────────────────────────────────────────────
   ASSIGNMENTS  (課題管理)
   Storage key: campus_assignments  [ { id, course, title, due, done } ]
───────────────────────────────────────────── */
const ASSIGN_KEY = 'campus_assignments';

function getAssignments() {
  try { return JSON.parse(localStorage.getItem(ASSIGN_KEY) || '[]'); }
  catch { return []; }
}
function saveAssignments(arr) { localStorage.setItem(ASSIGN_KEY, JSON.stringify(arr)); }

function openAssignmentModal() {
  // populate course dropdown
  const sel = document.getElementById('as-course');
  sel.innerHTML = '';
  courses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name; opt.textContent = c.name;
    sel.appendChild(opt);
  });
  document.getElementById('as-title').value = '';
  document.getElementById('as-due').value   = '';
  document.getElementById('as-err').textContent = '';
  document.getElementById('assignment-overlay').classList.add('open');
}
function closeAssignmentModal() {
  document.getElementById('assignment-overlay').classList.remove('open');
}

function addAssignment() {
  const course = document.getElementById('as-course').value;
  const title  = document.getElementById('as-title').value.trim();
  const due    = document.getElementById('as-due').value;
  const err    = document.getElementById('as-err');
  err.textContent = '';
  if (!course) { err.textContent = '講義を選択してください'; return; }
  if (!title)  { err.textContent = '課題名を入力してください'; return; }
  if (!due)    { err.textContent = '期限を入力してください'; return; }
  const list = getAssignments();
  list.push({ id: Date.now(), course, title, due, done: false });
  saveAssignments(list);
  renderAssignments();
  closeAssignmentModal();
  showToast('📝 課題を追加しました');
}

function checkAssignment(id) {
  const list = getAssignments();
  const item = list.find(a => a.id === id);
  if (!item) return;
  item.done = true;
  saveAssignments(list);
  renderAssignments();
}

function restoreAssignment(id) {
  const list = getAssignments();
  const item = list.find(a => a.id === id);
  if (!item) return;
  item.done = false;
  saveAssignments(list);
  renderAssignments();
  closeDoneAssignModal();
}

function renderAssignments() {
  const wrap = document.getElementById('assignments-wrap');
  const list = document.getElementById('assignments-list');
  const all  = getAssignments();
  const active = all.filter(a => !a.done);

  // Show/hide done button
  let doneBtn = document.getElementById('btn-show-done');
  if (!doneBtn) {
    doneBtn = document.createElement('button');
    doneBtn.id = 'btn-show-done';
    doneBtn.textContent = '✅ 提出済みを確認';
    doneBtn.onclick = openDoneAssignModal;
    wrap.appendChild(doneBtn);
  }
  const doneCount = all.filter(a => a.done).length;
  doneBtn.style.display = doneCount > 0 ? 'block' : 'none';
  doneBtn.textContent = `✅ 提出済みを確認 (${doneCount}件)`;

  if (!active.length) {
    list.innerHTML = '<div class="assign-empty">📭 未提出の課題はありません</div>';
    // still show section if there are done items
    wrap.style.display = (all.length > 0) ? 'block' : 'none';
    return;
  }

  wrap.style.display = 'block';
  list.innerHTML = '';
  const now = Date.now();
  active.sort((a,b) => new Date(a.due) - new Date(b.due));
  active.forEach(a => {
    const dueMs  = new Date(a.due).getTime();
    const diff   = dueMs - now;
    const overdue = diff < 0;
    const near    = !overdue && diff < 1000*60*60*24*2; // 2日以内
    const dueStr  = new Date(a.due).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const item = document.createElement('div');
    item.className = 'assign-item' + (overdue ? ' overdue' : '');
    item.innerHTML = `
      <div class="assign-dot"></div>
      <div class="assign-body">
        <div class="assign-course">${esc(a.course)}</div>
        <div class="assign-title">${esc(a.title)}</div>
        <div class="assign-due ${overdue?'over':near?'near':''}">${overdue?'⚠️ 期限超過: ':'期限: '}${dueStr}</div>
      </div>
      <button class="assign-check" title="提出済みにする" onclick="checkAssignment(${a.id})">✓</button>`;
    list.appendChild(item);
  });
}

function openDoneAssignModal() {
  const all  = getAssignments();
  const done = all.filter(a => a.done);
  const wrap = document.getElementById('done-assign-list');
  wrap.innerHTML = '';

/* ─────────────────────────────────────────────
   COURSE OVERRIDE  (講義切替・非表示)
   Storage key: campus_course_override_<userId>
   { "day:period": { type:'switch'|'hide', courseName } }
───────────────────────────────────────────── */
function overrideKey() {
  const id = currentUserId() || '_guest';
  return `campus_co_${id}`;
}
function getOverrides() {
  try { return JSON.parse(localStorage.getItem(overrideKey()) || '{}'); }
  catch { return {}; }
}
function saveOverrides(obj) { localStorage.setItem(overrideKey(), JSON.stringify(obj)); }

// 特定の day:period に対して表示する講義を解決する
function resolveDisplayCourse(day, period, candidates) {
  if (!candidates.length) return null;
  const ov = getOverrides()[`${day}:${period}`];
  if (ov) {
    if (ov.type === 'hide') return null;
    if (ov.type === 'switch') {
      const found = candidates.find(c => c.name === ov.courseName);
      if (found) return found;
    }
  }
  return candidates[0]; // デフォルト: 最初のもの
}

/* ─────────────────────────────────────────────
   EDIT LOCK: 4/26 以降は変更・削除・追加不可
───────────────────────────────────────────── */
function isEditLocked() {
  const now = TEST.active
    ? new Date()   // テストモードでも実日付で判定
    : new Date();
  // 4月26日 0:00 以降はロック
  return now >= new Date(now.getFullYear(), 3, 26); // month is 0-indexed
}

/* ─────────────────────────────────────────────
   受講者数: 全ユーザーのオーバーライドを集計
───────────────────────────────────────────── */
function countTakers(courseName) {
  const users = getUsers(); // { [id]: { hash } }
  const ids = Object.keys(users);
  let count = 0;
  ids.forEach(id => {
    const key = `campus_co_${id}`;
    let overrides = {};
    try { overrides = JSON.parse(localStorage.getItem(key) || '{}'); } catch {}
    // このユーザーが courseName を表示しているか
    const DAYS_ALL = ['Mon','Tue','Wed','Thu','Fri','Sat'];
    let visible = false;
    DAYS_ALL.forEach(d => {
      [1,2,3,4,5,6].forEach(p => {
        const cands = courses.filter(c => c.slots.some(s => s.day===d && s.period===p));
        if (!cands.length) return;
        const ov = overrides[`${d}:${p}`];
        let shown;
        if (ov) {
          if (ov.type === 'hide') return;
          if (ov.type === 'switch') {
            shown = cands.find(c => c.name === ov.courseName);
          }
        } else {
          shown = cands[0];
        }
        if (shown && shown.name === courseName) visible = true;
      });
    });
    if (visible) count++;
  });
  return count;
}

let _csSwitchContext = null; // { day, period, candidates, isEmpty }

function openCourseSwitchModal(day, period, candidates, isEmpty) {
  _csSwitchContext = { day, period, candidates: candidates || [], isEmpty: !!isEmpty };

  const locked = isEditLocked();
  const isAdd  = isEmpty || (!candidates || candidates.length === 0);

  document.getElementById('cs-title').textContent =
    isAdd ? `${DAY_JA[day]}曜 ${period}限 — 講義を追加` : `${DAY_JA[day]}曜 ${period}限 — 講義の設定`;

  // 受講者数表示（追加モード以外、かつ候補が存在するとき）
  const takersRow = document.getElementById('cs-takers-row');
  if (!isAdd && candidates && candidates.length > 0) {
    const ov = getOverrides()[`${day}:${period}`];
    let current = candidates[0];
    if (ov && ov.type === 'switch') {
      current = candidates.find(c => c.name === ov.courseName) || candidates[0];
    }
    const count = countTakers(current.name);
    document.getElementById('cs-takers-count').textContent = count;
    takersRow.style.display = 'block';
  } else {
    takersRow.style.display = 'none';
  }

  // セレクト候補構築
  const sel = document.getElementById('cs-select');
  sel.innerHTML = '';
  const pool = isAdd
    ? courses.filter(c => c.slots.some(s => s.day===day && s.period===period))
    : (candidates || []);

  if (isAdd && pool.length === 0) {
    // この時限に登録できる講義がない
    document.getElementById('cs-select-label').textContent = '候補の講義';
    const opt = document.createElement('option');
    opt.textContent = '（この時限に講義がありません）';
    opt.disabled = true;
    sel.appendChild(opt);
  } else {
    document.getElementById('cs-select-label').textContent = isAdd ? '追加する講義' : '表示する講義';
    pool.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name;
      sel.appendChild(opt);
    });
    // 現在の選択を反映（変更モードのみ）
    if (!isAdd) {
      const ov = getOverrides()[`${day}:${period}`];
      if (ov && ov.type === 'switch') sel.value = ov.courseName;
    }
  }

  // ボタン表示制御
  const actionBtns = document.getElementById('cs-action-btns');
  const lockedMsg  = document.getElementById('cs-locked-msg');
  const changeBtn  = document.getElementById('cs-change-btn');
  const deleteBtn  = document.getElementById('cs-delete-btn');

  if (locked) {
    actionBtns.style.display = 'none';
    lockedMsg.style.display  = 'block';
  } else {
    actionBtns.style.display = 'block';
    lockedMsg.style.display  = 'none';
    changeBtn.textContent = isAdd ? '追加' : '変更';
    deleteBtn.style.display = isAdd ? 'none' : 'block';
  }

  // セレクト変更時に受講者数をリアルタイム更新
  sel.onchange = () => {
    const name = sel.value;
    if (name && document.getElementById('cs-takers-row').style.display !== 'none') {
      document.getElementById('cs-takers-count').textContent = countTakers(name);
    }
  };

  document.getElementById('course-switch-overlay').classList.add('open');
}

function closeCourseSwitch() {

}

/* ─────────────────────────────────────────────
   TEST MODE PANEL
   Hidden unless: URL has ?testmode, OR logo
   clicked 5×, OR Konami code entered.
───────────────────────────────────────────── */
let _konamiSeq = [];
const KONAMI = [38,38,40,40,37,39,37,39,66,65];
let _logoClicks = 0, _logoTimer = null;

function _initTestMode() {
  // URL flag
  if (location.search.includes('testmode')) _openTestPanel();

  // Konami code
  document.addEventListener('keydown', e => {
    _konamiSeq.push(e.keyCode);
    if (_konamiSeq.length > 10) _konamiSeq.shift();
    if (_konamiSeq.join(',') === KONAMI.join(',')) {
      _konamiSeq = [];
      _openTestPanel();
    }
  });

  // Logo 5× fast click
  document.querySelector('.logo').addEventListener('click', () => {
    _logoClicks++;
    clearTimeout(_logoTimer);
    if (_logoClicks >= 5) { _logoClicks = 0; _openTestPanel(); return; }
    _logoTimer = setTimeout(() => { _logoClicks = 0; }, 1500);
  });

  // Sync selects with real time as default
  _syncTestDefaults();
}

function _syncTestDefaults() {
  const now  = new Date();
  const real = JS_DAY[now.getDay()] || 'Mon';
  const sel  = document.getElementById('tm-day');
  if (sel) sel.value = real;
  const h = document.getElementById('tm-hour');
  const m = document.getElementById('tm-min');
  if (h) h.value = String(now.getHours()).padStart(2,'0');
  if (m) m.value = String(now.getMinutes()).padStart(2,'0');
  _refreshTestDisplay();
}

function _openTestPanel() {
  const p = document.getElementById('testmode-panel');
  if (!p) return;
  p.style.display = 'flex';
  _syncTestDefaults();
  showToast('🔧 テストモードパネルを開きました');
}

function tmToggle() {
  const p = document.getElementById('testmode-panel');
  const body = document.getElementById('tm-body');
  const arrow = document.getElementById('tm-arrow');
  const collapsed = body.style.display === 'none';
  body.style.display  = collapsed ? 'flex' : 'none';
  arrow.textContent   = collapsed ? '▼' : '▲';
}

function tmApply() {
  const day = document.getElementById('tm-day').value;
  const h   = parseInt(document.getElementById('tm-hour').value)  || 0;
  const m   = parseInt(document.getElementById('tm-min').value)   || 0;
  TEST.active  = true;
  TEST.dayKey  = day;
  TEST.minutes = h*60 + m;
  _refreshTestDisplay();
  // re-render with overridden time
  if (courses.length) { renderTimetable(); updateBanner(); rerenderPeriodHighlights(); }
  showToast(`🔧 テスト時刻: ${DAY_JA[day]}曜日 ${fmtMin(TEST.minutes)}`);
}

function tmStep(delta) {
  if (!TEST.active) tmApply();           // activate first
  TEST.minutes = Math.max(0, Math.min(1439, TEST.minutes + delta));
  // sync inputs
  document.getElementById('tm-hour').value = String(Math.floor(TEST.minutes/60)).padStart(2,'0');
  document.getElementById('tm-min').value  = String(TEST.minutes%60).padStart(2,'0');
  _refreshTestDisplay();
  if (courses.length) { renderTimetable(); updateBanner(); rerenderPeriodHighlights(); }
}

function tmStepDay(delta) {
  if (!TEST.active) tmApply();
  const idx = (DAYS.indexOf(TEST.dayKey) + delta + DAYS.length) % DAYS.length;
  TEST.dayKey = DAYS[idx];
  document.getElementById('tm-day').value = TEST.dayKey;
  _refreshTestDisplay();
  if (courses.length) { renderTimetable(); updateBanner(); rerenderPeriodHighlights(); }
}

function setPreset(h, m) {
  document.getElementById('tm-hour').value = String(h).padStart(2,'0');
  document.getElementById('tm-min').value  = String(m).padStart(2,'0');
  tmApply();
}

function tmReset() {
  TEST.active = false;
  _syncTestDefaults();
  if (courses.length) { renderTimetable(); updateBanner(); rerenderPeriodHighlights(); }
  showToast('🔧 テストモード解除 — 実時刻に戻しました');
}

function tmClose() {
  document.getElementById('testmode-panel').style.display = 'none';
  if (TEST.active) tmReset();
}

function _refreshTestDisplay() {
  const disp = document.getElementById('tm-display');
  if (!disp) return;
  if (TEST.active) {
    disp.textContent = `▶ ${DAY_JA[TEST.dayKey]}曜日 ${fmtMin(TEST.minutes)}`;
    disp.style.color = '#fbbf24';
  } else {
    const n = new Date();
    disp.textContent = `実時刻: ${DAY_JA[JS_DAY[n.getDay()]||'Mon']||'?'}曜日 ${fmtMin(n.getHours()*60+n.getMinutes())}`;
