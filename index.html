/* ─────────────────────────────────────────────
   BANNER
───────────────────────────────────────────── */
function updateBanner() {
  const banner  = document.getElementById('next-banner');
  const today   = todayKey();
  if (!today || !courses.length) { banner.style.display = 'none'; return; }

  // Courses today, sorted by period
  const todayCourses = courses
    .filter(c => c.slots.some(s => s.day === today))
    .map(c => ({ course: c, period: c.slots.find(s=>s.day===today).period }))
    .sort((a,b) => a.period - b.period);

  if (!todayCourses.length) { banner.style.display = 'none'; return; }

  const nm = nowMin();

  // Find the current or next course
  let inClass  = null;
  let nextItem = null;
  let afterBreak = false;

  for (const item of todayCourses) {
    const p = item.period;
    const s = PERIOD_START_MIN[p];
    const e = periodEndMin(p);
    if (nm >= s && nm <= e) { inClass = item; break; }
    if (nm < s && !nextItem) {
      nextItem = item;
      // check if we're in a break right before this period
      if (p > 1) {
        const prevE = periodEndMin(p-1);
        if (nm > prevE) afterBreak = true;
      }
    }
  }

  const bn       = document.getElementById('next-banner');
  const pill     = document.getElementById('bn-pill');
  const label    = document.getElementById('bn-label');
  const course   = document.getElementById('bn-course');
  const loc      = document.getElementById('bn-loc');
  const timeEl   = document.getElementById('bn-time');

  bn.className = ''; // reset mode classes
  bn.style.display = 'flex';

  if (inClass) {
    // ── 授業中 ──
    const c   = inClass.course;
    const p   = inClass.period;
    const rem = periodEndMin(p) - nm;
    const locStr = buildLocShort(c);
    bn.classList.add('mode-now');
    pill.textContent   = '授業中';
    label.textContent  = '';
    course.textContent = c.name;
    loc.textContent    = locStr ? `📍 ${locStr}` : '';
    timeEl.textContent = `残り ${rem}分 (〜${periodEndStr(p)})`;

  } else if (afterBreak && nextItem) {
    // ── 休憩中 ──
    const c   = nextItem.course;
    const p   = nextItem.period;
    const rem = PERIOD_START_MIN[p] - nm;
    const locStr = buildLocShort(c);
    bn.classList.add('mode-brk');
    pill.textContent   = '休憩中';
    label.textContent  = '次の科目は';
    course.textContent = c.name;
    loc.textContent    = locStr ? `📍 ${locStr}` : '';
    timeEl.textContent = `${rem}分後 (${periodStartStr(p)}〜)`;

  } else if (nextItem) {
    // ── 次の科目 ──
    const c   = nextItem.course;
    const p   = nextItem.period;
    const rem = PERIOD_START_MIN[p] - nm;
    const locStr = buildLocShort(c);
    bn.classList.add('');
    pill.textContent   = 'NEXT';
    label.textContent  = '次の科目は';
    course.textContent = c.name;
    loc.textContent    = locStr ? `📍 ${locStr}` : '';
    timeEl.textContent = rem < 60
      ? `${rem}分後 (${periodStartStr(p)}〜)`
      : `${periodStartStr(p)}〜 (${p}限)`;

  } else {
    // ── 本日の授業終了 ──
    bn.classList.add('mode-off');
    pill.textContent   = '本日終了';
    label.textContent  = 'お疲れさまでした';
    course.textContent = '';
    loc.textContent    = '';
    timeEl.textContent = '';
  }
}

/* ─────────────────────────────────────────────
   LOCATION HELPERS
───────────────────────────────────────────── */

// 建物・場所が "N" の場合は「教室不定」
function isUnknown(c) {
  return c.building === 'NA' || c.room === 'NA';
}

// フル表示: 「E棟 202」→ モーダル内などで使用
function buildLoc(c) {
  if (isUnknown(c)) return '教室不定';
  return [c.building ? c.building+'棟' : '', c.room].filter(Boolean).join(' ');
}

// 短縮表示: 「E202」→ カード・バナーで使用
function buildLocShort(c) {
  if (isUnknown(c)) return '教室不定';
  const bld  = (c.building || '').toUpperCase();
  const room = String(c.room || '');
  if (!bld && !room) return '';
  if (!bld) return room;
  if (!room) return bld;
  return bld + room; // "E" + "202" → "E202"
}

/*
  フロアマップ照合:
  利用可能マップ: E1, E2, W2, W3 (PNG, 同フォルダ)
  建物 + 場所の百の位 → キー例: "E2", "W3"
  百の位が 0 または数字でない場合は null
*/
function getFloorKey(c) {
  if (isUnknown(c)) return null;
  const bld = (c.building || '').toUpperCase();
  const room = String(c.room || '');
  // extract hundreds digit
  const m = room.match(/^(\d)/);          // 先頭数字 (例: 201→2, 101→1)
  if (!m) return null;
  const floor = m[1];
  const key = bld + floor;               // 例: "E2", "W3"
  return ['E1','E2','W2','W3'].includes(key) ? key : null;
}

function renderAll() {

    ? courses.filter(c => c.slots.some(s => s.day===today))
    : [];

  // Stats
  document.getElementById('stat-today').textContent   = today ? DAY_JA[today]+'曜日' : '—';
  document.getElementById('stat-today-n').textContent = todayCourses.length;
  document.getElementById('stat-cr').textContent      = courses.reduce((s,c)=>s+c.credits,0);

  const errChip = document.getElementById('stat-err-chip');
  errChip.style.display = errors.length ? 'flex' : 'none';
  if (errors.length) document.getElementById('stat-err').textContent = errors.length;

  document.getElementById('stats-bar').style.display = 'flex';

  renderTimetable();
  renderCourseList();
  renderAssignments();

  document.getElementById('import-panel').style.display   = 'none';
  document.getElementById('timetable-wrap').style.display = 'block';
  document.getElementById('course-list-wrap').style.display = 'block';

  document.getElementById('btn-view').style.display    = 'inline-flex';
  document.getElementById('btn-reload2').style.display = 'inline-flex';

  startTick();
}

/* ─────────────────────────────────────────────
   VIEW MODE  (week / day)
   デスクトップデフォルト: week
   モバイルデフォルト: day
   localStorage で上書き保存可能
───────────────────────────────────────────── */
const MOBILE_BP = 480; // px (= 30rem @ 16px base, matches CSS breakpoint)

function isMobile() { return window.innerWidth < MOBILE_BP; }

// Returns effective view: 'week' | 'day'
// Priority: localStorage override → device default
function getView() {
  const saved = localStorage.getItem('campus-view');
  if (saved === 'week' || saved === 'day') return saved;
  return isMobile() ? 'day' : 'week';
}

function toggleView() {
  const current = getView();
  const next    = current === 'week' ? 'day' : 'week';
  localStorage.setItem('campus-view', next);
  renderTimetable();
  updateViewBtn();
}

function updateViewBtn() {
  const btn = document.getElementById('btn-view');
  if (!btn) return;
  btn.textContent = getView() === 'week' ? '📅 日表示' : '📅 週表示';
}

/* ─────────────────────────────────────────────
   RENDER TIMETABLE  ── week or day ──
───────────────────────────────────────────── */
function renderTimetable() {
  const view    = getView();
  const today   = todayKey();
  const noToday = document.getElementById('no-today');
  const tbl     = document.getElementById('timetable');

  updateViewBtn();

  if (view === 'week') {
    renderWeek(tbl, noToday, today);
  } else {
    renderDay(tbl, noToday, today);
  }
}

/* ── 週間表示 ── */
function renderWeek(tbl, noToday, today) {
  // All days that have at least one course
  const usedDays = DAYS.filter(d => courses.some(c => c.slots.some(s => s.day === d)));
  const days = usedDays.length ? usedDays : DAYS.slice(0, 5);

  // Build grid: day → period → courses[]
  const grid = {};
  days.forEach(d => { grid[d] = {}; PERIODS.forEach(p => { grid[d][p] = []; }); });
  courses.forEach(c => c.slots.forEach(s => {
    if (grid[s.day] && grid[s.day][s.period] !== undefined) grid[s.day][s.period].push(c);
  }));

  tbl.style.display = '';
  noToday.style.display = 'none';

  const nm = nowMin();
  tbl.innerHTML = '';

  // ── thead ──
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  const th0   = document.createElement('th');
  th0.className = 'col-time';
  th0.textContent = '時限';
  hrow.appendChild(th0);
  days.forEach(d => {
    const th = document.createElement('th');
    th.className = 'col-day' + (d === today ? ' today-hdr' : '');
    th.innerHTML = `${DAY_JA[d]}<span class="hdr-day-en">${d}</span>`;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  // ── tbody ──
  const tbody = document.createElement('tbody');
  PERIODS.forEach(p => {
    const tr  = document.createElement('tr');
    tr.dataset.period = p;

    // time cell
    const ps    = PERIOD_START_MIN[p];
    const pe    = periodEndMin(p);
    const isNow = nm >= ps && nm <= pe;
    const isBrk = isBreak(p) && nm > pe && nm < (PERIOD_START_MIN[p+1] || Infinity);

    const td0 = document.createElement('td');
    td0.className = 'col-time' + (isNow ? ' is-now' : isBrk ? ' is-break' : '');
    td0.dataset.timecell = p;
    td0.innerHTML = `
      <div class="time-label">
        <span class="time-num${isNow ? ' active-num' : ''}">${p}</span>
        <span class="time-start">${periodStartStr(p)}</span>
        <span class="time-end">${periodEndStr(p)}</span>
      </div>`;
    tr.appendChild(td0);

    days.forEach(d => {
      const td = document.createElement('td');
      td.className = 'col-day' + (d === today ? ' today-col' : '');
      const cs = grid[d][p];
      const resolved = resolveDisplayCourse(d, p, cs);
      if (resolved) {
        td.appendChild(makeCard(resolved, isNow && d === today, d, p, cs));
      } else {
        // 空セル: この曜日×時限に候補がある（非表示設定）か、
        // あるいは全く講義がない場合でもタップで追加モーダルへ
        const hasCandidates = courses.some(c => c.slots.some(s => s.day===d && s.period===p));
        if (hasCandidates || !isEditLocked()) {
          td.classList.add('cell-empty-clickable');
          td.onclick = () => openCourseSwitchModal(d, p, cs, true);
        }
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}

/* ── 日間表示 ── */
function renderDay(tbl, noToday, today) {
  const todayCourses = today
    ? courses.filter(c => c.slots.some(s => s.day === today))
    : [];

  if (!today || !todayCourses.length) {
    tbl.style.display = 'none';
    noToday.style.display = 'block';
    let msg;
    if (!today) {
      msg = isHolidayDate(new Date()) ? '休日' : '土日・祝日';
    } else {
      msg = DAY_JA[today] + '曜日';
    }
    document.getElementById('no-today-day').textContent = msg;
    document.getElementById('next-banner').style.display = 'none';
    return;
  }

  tbl.style.display = '';
  noToday.style.display = 'none';

  const grid = {};
  PERIODS.forEach(p => { grid[p] = []; });
  todayCourses.forEach(c => {
    c.slots.filter(s => s.day === today).forEach(s => {
      if (grid[s.period] !== undefined) grid[s.period].push(c);
    });
  });

  const nm = nowMin();
  tbl.innerHTML = '';

  // ── thead ──
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  const th0   = document.createElement('th');
  th0.className = 'col-time';
  th0.textContent = '時限';
  hrow.appendChild(th0);
  const th1 = document.createElement('th');
  th1.className = 'col-day today-hdr';
  th1.textContent = `${DAY_JA[today]}曜日`;
  hrow.appendChild(th1);
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  // ── tbody ──
  const tbody = document.createElement('tbody');
  PERIODS.forEach(p => {
    const cs  = grid[p];
    const ps  = PERIOD_START_MIN[p];
    const pe  = periodEndMin(p);
    const isNow = nm >= ps && nm <= pe;
    const isBrk = isBreak(p) && nm > pe && nm < (PERIOD_START_MIN[p + 1] || Infinity);
    const isPast = nm > pe && !isNow;
    if (cs.length === 0 && isPast) return;

    const tr = document.createElement('tr');
    tr.dataset.period = p;

    const td0 = document.createElement('td');
    td0.className = 'col-time' + (isNow ? ' is-now' : isBrk ? ' is-break' : '');
    td0.dataset.timecell = p;
    td0.innerHTML = `
      <div class="time-label">
        <span class="time-num${isNow ? ' active-num' : ''}">${p}</span>
        <span class="time-start">${periodStartStr(p)}</span>
        <span class="time-end">${periodEndStr(p)}</span>
      </div>`;
    tr.appendChild(td0);

    const td1 = document.createElement('td');
    td1.className = 'col-day';
    const resolved = resolveDisplayCourse(today, p, cs);
    if (resolved) {
      td1.appendChild(makeCard(resolved, isNow, today, p, cs));
    } else if (cs.length > 0) {
      // 非表示設定の空セル
      td1.classList.add('cell-empty-clickable');
      td1.onclick = () => openCourseSwitchModal(today, p, cs, true);
    } else {
      // 全く講義がない空セル
      const hasCandidates = courses.some(c => c.slots.some(s => s.day===today && s.period===p));
      if (hasCandidates) {
        td1.classList.add('cell-empty-clickable');
        td1.onclick = () => openCourseSwitchModal(today, p, [], true);
      }
    }
    tr.appendChild(td1);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}

function rerenderPeriodHighlights() {

function makeCard(c, isActive, day, period, allCandidates) {
  const key  = c.code||c.name;
  const ci   = colorMap[key] !== undefined ? colorMap[key] : 0;
  const card = document.createElement('div');

  // 今日の日付で休講チェック
  const dateStr = (() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  })();
  const cancelled = day && period && isCancelled(dateStr, String(period));

  const isWeek = getView() === 'week';
  card.className = `course-card cc-${ci}${isActive?' card-active':''}${cancelled?' is-cancelled':''}${isWeek?' card-week':''}`;
  const locShort = buildLocShort(c);

  if (isWeek) {
    // 週表示: 教室を最下部中央に
    card.innerHTML = `
      ${cancelled ? '<span class="card-cancelled">休講</span>' : ''}
      <div class="cn">${esc(c.name)}</div>
      <div class="cm">
        <span class="cm-teacher">${esc(c.teacher||'—')}</span>
      </div>
      ${locShort ? `<div class="cm-room-week">${esc(locShort)}</div>` : ''}`;
  } else {
    // 日表示: 教室を右端に
    card.innerHTML = `
      ${cancelled ? '<span class="card-cancelled">休講</span>' : ''}
      <div class="cn">${esc(c.name)}</div>
      <div class="cm">
        <span class="cm-teacher">${esc(c.teacher||'—')}</span>
        ${locShort ? `<span class="cm-room">📍${esc(locShort)}</span>` : ''}
      </div>`;
  }

  // クリック処理: 常に設定モーダルを開く（単独でも複数でも）
  if (day && period) {
    card.onclick = () => openCourseSwitchModal(day, period, allCandidates || [c], false);
  } else {
    card.onclick = () => openModal(c);
  }
  return card;
}

/* ─────────────────────────────────────────────
   COURSE LIST — 選択中の科目のみ表示・折りたたみ式
───────────────────────────────────────────── */
function getActiveCourses() {
  // 各 day:period で resolveDisplayCourse を通して表示中の科目のみ抽出
  const seen = new Set();
  const result = [];
  const DAYS_ALL = ['Mon','Tue','Wed','Thu','Fri','Sat'];
  DAYS_ALL.forEach(d => {
    [1,2,3,4,5,6].forEach(p => {
      const cands = courses.filter(c => c.slots.some(s => s.day===d && s.period===p));
      if (!cands.length) return;
      const resolved = resolveDisplayCourse(d, p, cands);
      if (resolved && !seen.has(resolved.name)) {
        seen.add(resolved.name);
        result.push(resolved);
      }
    });
  });
  return result;
}

/* ─────────────────────────────────────────────
   LOGIN  —  localStorage にハッシュ保存
   キー: campus_users  { [id]: { hash, salt } }
       campus_session { id }
───────────────────────────────────────────── */
const AUTH_KEY    = 'campus_users';
const SESSION_KEY = 'campus_session';
let loginMode = 'login'; // 'login' | 'register'

// Web Crypto API で SHA-256 ハッシュ生成
async function sha256(str) {
  const buf  = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY) || '{}'); }
  catch { return {}; }
}
function saveUsers(u) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(u));
}
function getSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }
  catch { return null; }
}
function saveSession(id) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ id }));
}
function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function switchLoginMode() {
  loginMode = loginMode === 'login' ? 'register' : 'login';
  const isReg = loginMode === 'register';
  document.getElementById('login-mode-label').textContent =
    isReg ? '新規アカウント登録' : '学籍番号でログイン';
  document.getElementById('login-submit-btn').textContent =
    isReg ? '登録してログイン' : 'ログイン';
  document.querySelector('.login-register-link').innerHTML = isReg
    ? '既にアカウントがある場合は <button onclick="switchLoginMode()">ログイン</button>'
    : '初めて使う場合は <button onclick="switchLoginMode()">新規登録</button>';
  document.getElementById('login-err').textContent = '';
}

async function loginSubmit() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const err = document.getElementById('login-err');
  err.textContent = '';

  if (!id) { err.textContent = '学籍番号を入力してください'; return; }
  if (!pw)  { err.textContent = 'パスワードを入力してください'; return; }

  // 学籍番号の書式バリデーション: 数字2桁 + 大文字アルファベット1文字 + 数字4桁
  if (!/^[0-9]{2}[A-Z]{1}[0-9]{4}$/.test(id)) {
    err.textContent = '学籍番号の書式が正しくありません（例: 24A1234）。アルファベットは大文字で入力してください';
    return;
  }

  const users = getUsers();
  const hash  = await sha256(id + ':' + pw); // id を salt 代わりに使用

  if (loginMode === 'register') {
    if (users[id]) {
      err.textContent = 'この学籍番号は既に登録されています';
      return;
    }
    users[id] = { hash };
    saveUsers(users);
    saveSession(id);
    onLoginSuccess(id);
  } else {
    const user = users[id];
    if (!user) {
      err.textContent = '学籍番号が見つかりません。新規登録してください';
      return;
    }
    if (user.hash !== hash) {
      err.textContent = 'パスワードが正しくありません';
      return;
    }
    saveSession(id);
    onLoginSuccess(id);
  }
}

function onLoginSuccess(id) {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('inp-pw').value = '';
  document.getElementById('login-err').textContent = '';
  // ヘッダーにユーザー表示 (デスクトップ)
  document.getElementById('user-id-display').textContent = id;
  document.getElementById('user-chip').style.display  = 'inline-flex';
  document.getElementById('btn-logout').style.display = 'inline-flex';
  document.getElementById('sep-user').style.display   = 'block';
  // ハンバーガーメニューにユーザー情報をセット
  document.getElementById('hmenu-user-id').textContent = id;
  document.getElementById('hmenu-user').style.display     = 'flex';
  document.getElementById('hmenu-div-user').style.display = 'block';
  document.getElementById('hmenu-logout').style.display   = 'flex';
  document.getElementById('hmenu-div-danger').style.display = 'block';
  document.getElementById('hmenu-delete').style.display   = 'flex';
  // 管理者専用メニュー（休講・課題追加は4/26以降非表示）
  const adminItems = document.querySelectorAll('.hmenu-admin-only');
  const showAdmin  = (id === ADMIN_ID) && !isEditLocked();
  adminItems.forEach(el => {
    el.style.display = showAdmin ? (el.tagName === 'BUTTON' ? 'flex' : 'block') : 'none';
  });
  // データ読み込み開始
  loadTimeXlsx();
}

function doLogout() {
  clearSession();
  closeHamburger();
  // UI リセット (デスクトップ)
  document.getElementById('user-chip').style.display  = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('sep-user').style.display   = 'none';
  // ハンバーガーメニューリセット
  document.getElementById('hmenu-user').style.display      = 'none';
  document.getElementById('hmenu-div-user').style.display  = 'none';
  document.getElementById('hmenu-logout').style.display    = 'none';
  document.getElementById('hmenu-div-danger').style.display= 'none';
  document.getElementById('hmenu-delete').style.display    = 'none';
  document.querySelectorAll('.hmenu-admin-only').forEach(el => el.style.display = 'none');
  // コンテンツ非表示
  document.getElementById('btn-view').style.display   = 'none';
  document.getElementById('btn-reload2').style.display= 'none';
  document.getElementById('timetable-wrap').style.display   = 'none';
  document.getElementById('course-list-wrap').style.display = 'none';
  document.getElementById('stats-bar').style.display        = 'none';
  document.getElementById('next-banner').style.display      = 'none';
  document.getElementById('import-panel').style.display     = 'none';
  loginMode = 'login';
  switchLoginMode(); // ラベルをリセット
  loginMode = 'login';
  document.getElementById('login-screen').classList.add('active');
}

function initAuth() {
  const session = getSession();
  if (session && session.id) {
    const users = getUsers();
    if (users[session.id]) {
      // セッション有効 → そのままロード
      onLoginSuccess(session.id);
      return;
    }
  }
  // 未ログイン → ログイン画面を表示
  document.getElementById('login-screen').classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeFloorMap();
    closeCancelClassModal();
    closeAssignmentModal();
    closeDoneAssignModal();
    closeCourseSwitch();
    closeHamburger();
  }
});
window.addEventListener('DOMContentLoaded', () => { initAuth(); _initTestMode(); });

// リサイズ時の再描画（localStorage override がなければデバイスデフォルトに追従）
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (!localStorage.getItem('campus-view') && courses.length) renderTimetable();
  }, 200);
});
</script>
</body>
</html>
